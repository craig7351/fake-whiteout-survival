  <ellipse cx="50" cy="50" rx="9" ry="6" fill="#e5677a" stroke="#b23b50" stroke-width="1.4"/>
  <circle cx="56" cy="50" r="2.4" fill="#fff" stroke="#b23b50" stroke-width="1"/>
</svg>
