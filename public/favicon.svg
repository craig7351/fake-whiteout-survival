  <circle cx="20" cy="20" r="8" fill="url(#fur)" stroke="#9fb2c8" stroke-width="1.5"/>
  <circle cx="44" cy="20" r="8" fill="url(#fur)" stroke="#9fb2c8" stroke-width="1.5"/>
  <!-- 熊頭 -->
  <path d="M14 32 q0 -14 18 -14 q18 0 18 14 q0 16 -18 18 q-18 -2 -18 -18 Z" fill="url(#fur)" stroke="#9fb2c8" stroke-width="1.5"/>
  <!-- 眼睛 -->
  <circle cx="25" cy="31" r="2.6" fill="#23303f"/>
  <circle cx="39" cy="31" r="2.6" fill="#23303f"/>
  <!-- 口鼻 -->
  <ellipse cx="32" cy="40" rx="8" ry="6" fill="#eef4fb"/>
  <ellipse cx="32" cy="37" rx="3.2" ry="2.4" fill="#23303f"/>
  <path d="M32 39 l0 4 M32 43 q-3 2 -5 0 M32 43 q3 2 5 0" stroke="#23303f" stroke-width="1.4" fill="none" stroke-linecap="round"/>
